services:
  db:
    image: postgres:18.0
    container_name: postgres-zero-inventory
    restart: always
    ports:
      - 5432:5432
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql
  
  pgAdmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin-zero-inventory
    restart: always
    depends_on:
      - db
    ports:
      - 8082:80
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@zeroinventory.com
      - PGADMIN_DEFAULT_PASSWORD=zeroinventory2026
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data: